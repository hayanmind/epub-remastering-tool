services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/core/node_modules
      - /app/packages/api/node_modules
      - /app/packages/web/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    env_file:
      - .env
