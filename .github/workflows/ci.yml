name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @gov-epub/core run build

      - name: Build API package
        run: pnpm --filter @gov-epub/api run build

      - name: Build web package
        run: pnpm --filter @gov-epub/web run build

      - name: Run core tests
        run: pnpm --filter @gov-epub/core run test

      - name: Run API tests
        run: pnpm --filter @gov-epub/api run test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core (dependency)
        run: pnpm --filter @gov-epub/core run build

      - name: TypeScript type check - core
        run: pnpm --filter @gov-epub/core exec tsc --noEmit

      - name: TypeScript type check - api
        run: pnpm --filter @gov-epub/api exec tsc --noEmit
